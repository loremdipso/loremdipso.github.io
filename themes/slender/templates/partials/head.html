<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

{% if page.title %}
<title>{{page.title}}</title>
{% else %}
<title>{{config.title}}</title>
{% endif %}

{% if page.description %}
    <meta name="description" content="{{- page.description -}}">
{% else %}
    <meta name="description" content="Good day to you">
{% endif %}
