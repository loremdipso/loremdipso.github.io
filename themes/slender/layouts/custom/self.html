<!DOCTYPE html>
<html>
	{{- partial "head.html" . -}}
	<body class="spotlight">
		{{- partial "header.html" . -}}

		<div class="hero-card fade-in">
			<div class="info">
				<h1>
					{{- $.Site.Author.name -}}
				</h1>

				{{- if $.Site.Author.job_title -}}
					<h2>
						{{- $.Site.Author.job_title -}}
					</h2>
				{{- end -}}
			</div>

			{{- if $.Site.Author.profile_pic_url -}}
				<img class="avatar" src="{{ $.Site.Author.profile_pic_url }}" />
			{{- end -}}
		</div>

		{{- partial "footer.html" . -}}
	</body>
</html>
